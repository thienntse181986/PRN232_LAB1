version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lms-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal;Database=LMS;User Id=sa;Password=1234567890;TrustServerCertificate=True;MultipleActiveResultSets=true
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure

